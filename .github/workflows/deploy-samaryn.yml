name: Deploy Samaryn VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-samaryn-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download model release asset
        env:
          GH_TOKEN: ${{ github.token }}
          SAMARYN_MODEL_RELEASE_TAG: ${{ vars.SAMARYN_MODEL_RELEASE_TAG }}
          SAMARYN_MODEL_ASSET_NAME: ${{ vars.SAMARYN_MODEL_ASSET_NAME || 'model.onnx' }}
          SAMARYN_MODEL_CHECKSUM_ASSET_NAME: ${{ vars.SAMARYN_MODEL_CHECKSUM_ASSET_NAME || 'model.onnx.sha256' }}
        run: bash ops/fetch-model-release-asset.sh

      - name: Build gateway image
        run: docker build -t samaryn-src-gateway:latest ./gateway

      - name: Build ML service image
        run: docker build -t samaryn-ml-service:latest ./ml-service

      - name: Package Docker images and deploy script
        run: |
          docker save samaryn-src-gateway:latest | gzip > samaryn-gateway-image.tar.gz
          docker save samaryn-ml-service:latest | gzip > samaryn-ml-service-image.tar.gz
          tar -czf samaryn-release.tgz \
            samaryn-gateway-image.tar.gz \
            samaryn-ml-service-image.tar.gz \
            ops/fetch-model-release-asset.sh \
            ops/deploy-vps.sh

      - name: Start SSH agent
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SAMARYN_VPS_SSH_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/samaryn_deploy
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/samaryn_deploy
          ssh-add ~/.ssh/samaryn_deploy

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SAMARYN_VPS_PORT || 22 }}" -H "${{ secrets.SAMARYN_VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: |
          scp -P "${{ secrets.SAMARYN_VPS_PORT || 22 }}" \
            samaryn-release.tgz \
            "${{ secrets.SAMARYN_VPS_USER }}@${{ secrets.SAMARYN_VPS_HOST }}:/tmp/samaryn-release.tgz"

      - name: Run remote deploy
        id: deploy
        env:
          MEOWLABS_API_KEY: ${{ secrets.MEOWLABS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAMARYN_AUTH_KEY: ${{ secrets.SAMARYN_AUTH_KEY }}
          SAMARYN__AUTH_KEYS: ${{ secrets.SAMARYN_AUTH_KEY }}
        run: |
          ssh -p "${{ secrets.SAMARYN_VPS_PORT || 22 }}" \
            "${{ secrets.SAMARYN_VPS_USER }}@${{ secrets.SAMARYN_VPS_HOST }}" \
            "export MEOWLABS_API_KEY=$(printf %q \"$MEOWLABS_API_KEY\"); export GEMINI_API_KEY=$(printf %q \"$GEMINI_API_KEY\"); export SAMARYN_AUTH_KEY=$(printf %q \"$SAMARYN_AUTH_KEY\"); export SAMARYN__AUTH_KEYS=$(printf %q \"$SAMARYN__AUTH_KEYS\"); rm -rf /tmp/samaryn-bootstrap && mkdir -p /tmp/samaryn-bootstrap && tar -xzf /tmp/samaryn-release.tgz -C /tmp/samaryn-bootstrap ops/deploy-vps.sh && bash /tmp/samaryn-bootstrap/ops/deploy-vps.sh /tmp/samaryn-release.tgz"

      - name: Notify Telegram
        if: always()
        env:
          ST: ${{ job.status }}
          SH: ${{ github.sha }}
          RP: ${{ github.repository }}
          RN: ${{ github.run_id }}
          SU: ${{ github.server_url }}
        run: |
          ssh -p "${{ secrets.SAMARYN_VPS_PORT || 22 }}"             "${{ secrets.SAMARYN_VPS_USER }}@${{ secrets.SAMARYN_VPS_HOST }}"             "printf '%s\n'               '[Samaryn] Deploy: $ST'               ''               'Commit: $SH'               'Run: $SU/$RP/actions/runs/$RN'             | /home/meowlabs/.local/bin/hermes send --to telegram:-1003792052859"
